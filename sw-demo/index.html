<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Async Framework Service Worker Demo</title>
    <style>
      body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f6f7f9; color: #172033; }
      main { max-width: 760px; margin: 0 auto; padding: 40px 24px; }
      .panel { border: 1px solid #d9dee8; border-radius: 8px; background: #fff; padding: 18px; }
      button, a { font: inherit; display: inline-block; padding: 8px 10px; border: 1px solid #162033; border-radius: 6px; background: #162033; color: #fff; text-decoration: none; cursor: pointer; }
      .secondary { background: #fff; color: #162033; border-color: #8b96a8; }
      code { background: #f6f7f9; border: 1px solid #d9dee8; border-radius: 4px; padding: 2px 4px; }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <h1>Async Framework Service Worker Demo</h1>
        <p id="status">Installing the browser-side server emulator...</p>
        <p>
          <button id="reset" type="button" class="secondary">Reset service worker</button>
        </p>
      </section>
    </main>
    <script type="module">
      const status = document.getElementById('status');
      const resetButton = document.getElementById('reset');

      const setStatus = (message) => {
        status.textContent = message;
      };

      const clearDemoCaches = async () => {
        if (!('caches' in window)) return;

        for (const key of await caches.keys()) {
          if (key.startsWith('async-framework-demo-')) {
            await caches.delete(key);
          }
        }
      };

      const unregisterDemoWorker = async () => {
        if (!('serviceWorker' in navigator)) return;

        const registrations = await navigator.serviceWorker.getRegistrations();

        await Promise.all(registrations
          .filter((registration) => registration.scope.includes('/sw-demo/'))
          .map((registration) => registration.unregister()));
        await clearDemoCaches();
      };

      resetButton.addEventListener('click', async () => {
        setStatus('Resetting service worker and demo caches...');
        await unregisterDemoWorker();
        location.href = './?nosw=1';
      });

      if (!('serviceWorker' in navigator)) {
        setStatus('This browser does not support service workers. Use the Node.js demo server instead.');
      } else if (new URLSearchParams(location.search).get('nosw') === '1') {
        await unregisterDemoWorker();
        setStatus('Service worker removed. Reload this page to install a fresh worker.');
      } else {
        const registration = await navigator.serviceWorker.register('./service-worker.mjs', {
          type: 'module',
          scope: './',
          updateViaCache: 'none',
        });

        await registration.update();
        await navigator.serviceWorker.ready;

        if (!navigator.serviceWorker.controller) {
          await new Promise((resolve) => {
            const timer = setTimeout(resolve, 1500);
            navigator.serviceWorker.addEventListener('controllerchange', () => {
              clearTimeout(timer);
              resolve();
            }, { once: true });
          });
        }

        setStatus('Service worker ready. Opening the emulated server routes...');
        location.replace('./');
      }
    </script>
  </body>
</html>
